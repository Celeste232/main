<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Rounded square background in soft lavender -->
  <rect x="64" y="64" width="896" height="896" rx="180"
        fill="#dcd5f5"/>

  <!-- Doodle cat, side profile, walking pose -->
  <g stroke="#1a1a1a" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="#ffffff">

    <!-- Body (long oval) -->
    <ellipse cx="620" cy="510" rx="190" ry="115"/>

    <!-- Head (smaller circle on the left) -->
    <ellipse cx="400" cy="490" rx="110" ry="115"/>

    <!-- Ears -->
    <path d="M335 405 L320 340 L380 395 Z" fill="#ffffff"/>
    <path d="M465 405 L480 340 L420 395 Z" fill="#ffffff"/>

    <!-- Tail, curved up to the right -->
    <path d="M800 460 Q860 380 850 320" fill="none"/>

    <!-- Front leg (under head) -->
    <line x1="465" y1="610" x2="465" y2="700" />
    <line x1="510" y1="610" x2="510" y2="700" />
    <!-- Back leg (under body) -->
    <line x1="700" y1="615" x2="700" y2="700" />
    <line x1="745" y1="615" x2="745" y2="700" />
  </g>

  <!-- Face: eyes, whiskers, smile -->
  <g stroke="#1a1a1a" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Whiskers -->
    <path d="M295 480 L355 488"/>
    <path d="M295 510 L355 510"/>
    <path d="M295 538 L355 532"/>
  </g>
  <g fill="#1a1a1a">
    <!-- Eyes -->
    <circle cx="380" cy="480" r="13"/>
    <circle cx="440" cy="480" r="13"/>
  </g>
  <g stroke="#1a1a1a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Smile -->
    <path d="M395 525 Q410 545 425 525"/>
  </g>

  <!-- "Meow" in childish wobbly handwriting -->
  <g stroke="#1a1a1a" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- M -->
    <path d="M 360 820
             L 370 770
             L 410 815
             L 450 770
             L 462 822"/>
    <!-- e -->
    <path d="M 510 800
             Q 510 778 530 778
             Q 552 778 552 798
             Q 552 808 508 808
             Q 508 826 530 826
             Q 545 826 555 818"/>
    <!-- o -->
    <path d="M 612 802
             Q 612 778 590 778
             Q 568 778 568 802
             Q 568 826 590 826
             Q 612 826 612 802 Z"/>
    <!-- w -->
    <path d="M 638 780
             L 648 826
             L 672 790
             L 696 826
             L 706 780"/>
  </g>
</svg>
