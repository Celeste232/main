<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">

  <!-- Lavender background -->
  <rect x="40" y="40" width="944" height="944" rx="190"
        fill="#c9c5f0"/>

  <g fill="#fff" stroke="#111" stroke-linecap="round" stroke-linejoin="round">

    <!-- Body — wide elongated oval -->
    <ellipse cx="620" cy="530" rx="205" ry="118" stroke-width="20"/>

    <!-- Head — large round circle, overlapping left side of body -->
    <ellipse cx="390" cy="460" rx="158" ry="158" stroke-width="20"/>

    <!-- Left ear -->
    <polygon points="318,345 340,258 408,338" stroke-width="18" fill="#fff"/>
    <!-- Right ear -->
    <polygon points="412,335 475,258 500,348" stroke-width="18" fill="#fff"/>

  </g>

  <!-- Eyes -->
  <circle cx="356" cy="438" r="14" fill="#111"/>
  <circle cx="432" cy="438" r="14" fill="#111"/>

  <!-- Smile -->
  <path d="M364 488 Q392 515 424 488"
        fill="none" stroke="#111" stroke-width="13" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <g stroke="#111" stroke-width="11" stroke-linecap="round">
    <line x1="232" y1="445" x2="340" y2="458"/>
    <line x1="228" y1="472" x2="338" y2="475"/>
    <line x1="232" y1="499" x2="340" y2="490"/>
  </g>

  <!-- Legs — 4 stick legs -->
  <g stroke="#111" stroke-width="18" stroke-linecap="round">
    <line x1="468" y1="640" x2="468" y2="740"/>
    <line x1="516" y1="643" x2="516" y2="743"/>
    <line x1="688" y1="643" x2="688" y2="743"/>
    <line x1="736" y1="640" x2="736" y2="740"/>
  </g>

  <!-- Tail — curls up from right end of body -->
  <path d="M815 500 Q870 420 848 330"
        fill="none" stroke="#111" stroke-width="20" stroke-linecap="round"/>

  <!-- "Meow" handwritten-style text -->
  <g fill="none" stroke="#111" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- M -->
    <path d="M312 828 L318 770 L366 820 L414 770 L420 830"/>
    <!-- e -->
    <path d="M450 808 Q448 778 472 776 Q498 776 498 800 Q498 812 448 812 Q448 834 472 834 Q490 834 500 824"/>
    <!-- o -->
    <path d="M558 804 Q558 776 534 776 Q510 776 510 804 Q510 832 534 832 Q558 832 558 804 Z"/>
    <!-- w -->
    <path d="M578 778 L590 832 L618 788 L646 832 L658 778"/>
  </g>

</svg>
