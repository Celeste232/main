name: Release

# Push a tag like v0.1.1 to trigger a Mac build + GitHub Release.
# OR: Actions tab → Release → Run workflow (choose branch + version).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build (e.g. claude/cat-house-interactions-pFJxU)'
        default: 'claude/cat-house-interactions-pFJxU'
        required: true
      version:
        description: 'Version label for the release (e.g. v0.1.1)'
        default: 'v0.1.1'
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS dmg + zip
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build app + package
        env:
          # No code signing — Apple Developer requires a paid account.
          # electron-builder still produces an unsigned .dmg/.zip; users
          # right-click → 열기 the first time per the manual.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          draft: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: Meow Mode ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          body: |
            ## 다운로드 / Download

            - **Apple Silicon Mac (M1/M2/M3/M4)**: `Meow Mode-*-arm64.dmg`
            - **Intel Mac**: `Meow Mode-*-x64.dmg`

            처음 실행 시: 우클릭 → "열기" → 다시 "열기" (macOS Sequoia는 시스템 설정 → 보안 → "그래도 열기")

            ---

            First launch: right-click → Open → Open again
            (macOS Sequoia: System Settings → Privacy & Security → Open Anyway)
