name: Release

# Push a tag like v0.1.1 to trigger a Mac build + GitHub Release.
# OR: Actions tab → Release → Run workflow (choose branch + version).
on:
  push:
    tags:
      - 'v*'
  # Manual trigger needs no inputs: the build always uses the dev branch's
  # latest commit and derives the version tag from package.json. So it no
  # longer matters which branch you pick in "Use workflow from".
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS dmg + zip
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Always build the development branch's latest commit, regardless of
          # which branch the workflow was launched from. This prevents the
          # build from accidentally packaging an old main commit when someone
          # picks the wrong "Use workflow from" branch in the UI.
          ref: claude/cat-house-interactions-pFJxU
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Resolve version from package.json
        id: ver
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build app + package
        env:
          # No code signing — Apple Developer requires a paid account.
          # electron-builder still produces an unsigned .dmg/.zip; users
          # right-click → 열기 the first time per the manual.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          draft: false
          # Tag name comes from package.json so it can never drift from the
          # code that was actually built. The tag is created on the built
          # branch's HEAD (target_commitish), not on stale main.
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: claude/cat-house-interactions-pFJxU
          name: Meow Mode ${{ steps.ver.outputs.tag }}
          body: |
            ## 다운로드 / Download

            - **Apple Silicon Mac (M1/M2/M3/M4)**: `Meow Mode-*-arm64.dmg`
            - **Intel Mac**: `Meow Mode-*-x64.dmg`

            처음 실행 시: 우클릭 → "열기" → 다시 "열기" (macOS Sequoia는 시스템 설정 → 보안 → "그래도 열기")

            ---

            First launch: right-click → Open → Open again
            (macOS Sequoia: System Settings → Privacy & Security → Open Anyway)
