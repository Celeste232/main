name: Release

# Push a tag like v0.1.0 to trigger a Mac build + GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS dmg + zip
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build app + package
        env:
          # No code signing — Apple Developer requires a paid account.
          # electron-builder still produces an unsigned .dmg/.zip; users
          # right-click → 열기 the first time per the manual.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          draft: true
          name: Meow Mode ${{ github.ref_name }}
          body: |
            ## 다운로드 / Download

            - **Apple Silicon Mac (M1/M2/M3/M4)**: `MeowMode-*-arm64.dmg`
            - **Intel Mac**: `MeowMode-*.dmg`

            처음 실행 시: 우클릭 → "열기" → 다시 "열기" (macOS Sequoia는 시스템 설정 → 보안 → "그래도 열기")

            ---

            First launch: right-click → Open → Open again
            (macOS Sequoia: System Settings → Privacy & Security → Open Anyway)
